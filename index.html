<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Consumo 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--sur:#181c27;--sur2:#1f2436;--bdr:#2a3047;--ac:#e84545;--ac2:#f59e0b;--ac3:#3b82f6;--gr:#22c55e;--tx:#e8eaf0;--mt:#8892a4;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:Arial,sans-serif;min-height:100vh;}
header{background:var(--sur);border-bottom:1px solid var(--bdr);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;}
.logo{font-weight:800;font-size:1.1rem;}.logo span{color:var(--ac);}
.hdr{display:flex;align-items:center;gap:0.6rem;}
.sync{font-size:0.75rem;color:var(--mt);margin-right:0.4rem;display:flex;align-items:center;gap:0.4rem;}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--mt);flex-shrink:0;}
.sdot.ok{background:var(--gr);}.sdot.err{background:var(--ac);}.sdot.sp{background:var(--ac3);animation:bl 1s infinite;}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0.3}}
button{cursor:pointer;border-radius:8px;font-size:0.85rem;padding:0.45rem 1rem;border:1px solid var(--bdr);background:var(--sur2);color:var(--mt);transition:all 0.2s;font-family:Arial,sans-serif;}
button:hover{color:var(--tx);border-color:var(--mt);}
.bp{background:var(--ac);color:white;border-color:var(--ac);}.bp:hover{background:#c73535;}
.container{max-width:1300px;margin:0 auto;padding:1.5rem;}
.vp{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;padding:1.25rem;margin-bottom:1.5rem;}
.vp h3{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--mt);margin-bottom:0.9rem;}
.tabs{display:flex;gap:0.6rem;flex-wrap:wrap;}
.tab{padding:0.5rem 1.2rem;border-radius:50px;border:1px solid var(--bdr);background:transparent;color:var(--mt);font-size:0.85rem;}
.tab:hover{border-color:var(--ac);color:var(--tx);}.tab.on{background:var(--ac);border-color:var(--ac);color:white;font-weight:600;}
.bdg{display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.2);border-radius:50px;font-size:0.72rem;padding:0 0.4rem;margin-left:0.3rem;min-width:18px;height:16px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem;}
.stat{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:1rem 1.25rem;}
.sl{font-size:0.7rem;color:var(--mt);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.3rem;}
.sv{font-size:1.8rem;font-weight:700;}.sv.r{color:var(--ac);}.sv.o{color:var(--ac2);}.sv.b{color:var(--ac3);}.sv.g{color:var(--gr);}
.sect{display:flex;align-items:center;gap:0.6rem;margin:1.5rem 0 0.8rem;}
.pill{padding:0.3rem 0.8rem;border-radius:50px;font-size:0.8rem;font-weight:600;}
.pill.r{background:rgba(232,69,69,0.1);color:var(--ac);border:1px solid rgba(232,69,69,0.3);}
.pill.o{background:rgba(245,158,11,0.1);color:var(--ac2);border:1px solid rgba(245,158,11,0.3);}
.prw{margin-bottom:1rem;}.prl{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--mt);margin-bottom:0.3rem;}
.prb{height:5px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;}
.prf{height:100%;background:var(--gr);border-radius:3px;transition:width 0.4s;}
.cards{display:flex;flex-direction:column;gap:0.8rem;}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;overflow:hidden;}
.card.done{border-left:3px solid var(--gr);}
.ct{display:grid;grid-template-columns:1fr auto;align-items:start;padding:1rem 1.25rem;cursor:pointer;user-select:none;}
.ci{font-size:0.72rem;color:var(--mt);margin-bottom:0.2rem;}
.cn{font-weight:700;font-size:0.95rem;margin-bottom:0.3rem;}
.cnu{display:flex;gap:1.2rem;flex-wrap:wrap;}
.nl{font-size:0.65rem;color:var(--mt);text-transform:uppercase;}
.nv{font-size:0.85rem;font-weight:500;}.hl{color:var(--ac2);font-weight:600;}
.vb{font-weight:800;font-size:1.2rem;padding:0.25rem 0.6rem;border-radius:6px;}
.vb.critica{background:rgba(232,69,69,0.15);color:var(--ac);}.vb.alta{background:rgba(232,69,69,0.1);color:#f87171;}
.vb.media{background:rgba(245,158,11,0.1);color:var(--ac2);}.vb.baja{background:rgba(59,130,246,0.1);color:var(--ac3);}
.vb.cero{background:rgba(107,114,128,0.15);color:#9ca3af;}
.xi{color:var(--mt);font-size:1.1rem;}
.expanded .xi{transform:rotate(180deg);}
.cf{border-top:1px solid var(--bdr);padding:1rem 1.25rem;display:none;background:rgba(255,255,255,0.02);}
.cf.open{display:block;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.fl{font-size:0.7rem;color:var(--mt);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.4rem;display:flex;align-items:center;gap:0.4rem;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}.dot.r{background:var(--ac);}.dot.g{background:var(--gr);}
textarea{width:100%;background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;color:var(--tx);font-family:Arial;font-size:0.85rem;padding:0.6rem 0.8rem;resize:vertical;min-height:80px;}
textarea:focus{outline:none;border-color:var(--ac3);}textarea::placeholder{color:#4a5568;}
.ff{display:flex;justify-content:flex-end;margin-top:0.7rem;}
.sb{border:1px solid var(--bdr);border-radius:8px;color:var(--mt);background:var(--sur2);font-size:0.8rem;padding:0.4rem 0.9rem;}
.sb:hover,.sb.flash{background:var(--gr);color:white;border-color:var(--gr);}
.toast{position:fixed;bottom:25px;right:25px;background:var(--gr);color:white;padding:0.65rem 1.3rem;border-radius:10px;font-size:0.9rem;transform:translateY(100px);opacity:0;transition:all 0.3s;z-index:999;}
.toast.show{transform:translateY(0);opacity:1;}
.empty{text-align:center;padding:4rem 2rem;color:var(--mt);font-size:1rem;}
.mw{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;overflow-y:auto;padding:2rem 1rem;}
.mb{background:var(--sur);border:1px solid var(--bdr);border-radius:16px;max-width:1100px;margin:0 auto;padding:1.5rem;}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.mf{display:flex;justify-content:space-between;align-items:center;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--bdr);}
@media(max-width:700px){.stats{grid-template-columns:repeat(2,1fr);}.fg{grid-template-columns:1fr;}}
</style>
</head><body>
<header>
<div class="logo">Consumo <span>2026</span></div>
<div class="hdr">
<div class="sync"><div class="sdot sp" id="sdot"></div><span id="slbl">Conectando...</span></div>
<button onclick="exportarExcel()">Excel</button>
<button onclick="verResumen()">Resumen</button>
<button class="bp" id="gbtn" onclick="guardarTodo()">Guardar todo</button>
</div></header>
<div class="container">
<div class="vp"><h3>Seleccionar Vendedor</h3><div class="tabs" id="vtabs"></div></div>
<div class="stats" id="stBlk"></div>
<div id="mc"></div>
</div>
<div class="toast" id="toast"></div>
<div class="mw" id="mRes" onclick="if(event.target===this)cerrar()">
<div class="mb">
<div class="mh"><strong>Resumen General</strong><button onclick="cerrar()">X</button></div>
<div id="rTabla" style="overflow-x:auto"></div>
<div class="mf"><span id="rStats" style="font-size:0.85rem;color:var(--mt)"></span><button class="bp" onclick="exportarExcel()">Exportar Excel</button></div>
</div></div>

        j.data.forEach(function(x){if(x.id_cliente)N[String(x.id_cliente)]={motivo:x.motivo||'',condiciones:x.condiciones||'',ts:x.ultima_actualizacion||''};});
        document.getElementById('slbl').textContent='Conectado '+j.data.length+' reg.';
        document.getElementById('sdot').className='sdot ok';return;
      }
    }
    document.getElementById('slbl').textContent='Conectado';
    document.getElementById('sdot').className='sdot ok';
  }catch(e){
    document.getElementById('slbl').textContent='Sin conexion Sheets';
    document.getElementById('sdot').className='sdot err';
  }
}

async function enviar(id){
  var todos=DATA.bajaron.concat(DATA.no_consumen);
  var c=todos.find(function(r){return r.id===id;});
  if(!c)return;
  var n=N[id]||{};
  try{await fetch(API,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify({id_cliente:id,empresa:c.empresa,vendedor:c.vendedor,motivo:n.motivo||'',condiciones:n.condiciones||''})});}catch(e){}
}

function fmt(n){return n>0?new Intl.NumberFormat('es-AR',{maximumFractionDigits:0}).format(n):'-';}
function fmtP(p){return p===null?'-':(p>=0?'+':'')+(p*100).toFixed(1)+'%';}
function bc(p){if(!p||p===0)return 'cero';if(p<=-0.8)return 'critica';if(p<=-0.5)return 'alta';if(p<=-0.2)return 'media';if(p<0)return 'baja';return 'cero';}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

function prog(lst){
  var c=lst.filter(function(r){var n=N[r.id];return n&&(n.motivo||n.condiciones);}).length;
  var p=lst.length?Math.round(c/lst.length*100):0;
  return '<div class="prw"><div class="prl"><span>Progreso</span><span>'+c+' de '+lst.length+' ('+p+'%)</span></div><div class="prb"><div class="prf" style="width:'+p+'%"></div></div></div>';
}

function card(r,tipo){
  var n=N[r.id]||{},done=!!(n.motivo||n.condiciones);
  var p=tipo==='b'?r.variacionPct:null;
  var chk=done?' <span style="color:var(--gr);font-size:0.72rem">OK Completado</span>':'';
  var vol=tipo==='b'?'<div><div class="nl">Vol 2026</div><div class="nv">'+fmt(r.vol2026)+'</div></div>':'';
  var badge=tipo==='b'?fmtP(p):'Sin consumo';
  var bcls=tipo==='b'?bc(p):'cero';
  return '<div class="card'+(done?' done':'')+'" id="c-'+r.id+'">'
    +'<div class="ct" onclick="tog(\''+r.id+'\')">'
    +'<div>'
    +'<div class="ci">ID '+r.id+chk+'</div>'
    +'<div class="cn">'+r.empresa+'</div>'
    +'<div class="cnu">'
    +'<div><div class="nl">2024</div><div class="nv">'+fmt(r.consumo2024)+'</div></div>'
    +'<div><div class="nl">2025</div><div class="nv">'+fmt(r.consumo2025)+'</div></div>'
    +'<div><div class="nl">Mejor historico</div><div class="nv hl">'+fmt(r.mejorHistorico)+' ('+r.annoMejor+')</div></div>'
    +vol
    +'</div>'
    +'</div>'
    +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.4rem">'
    +'<div class="vb '+bcls+'">'+badge+'</div>'
    +'<div class="xi" id="xi-'+r.id+'">v</div>'
    +'</div>'
    +'</div>'
    +'<div class="cf" id="f-'+r.id+'">'
    +'<div class="fg">'
    +'<div><div class="fl"><span class="dot r"></span>Motivo de la baja</div>'
    +'<textarea id="m-'+r.id+'" placeholder="Motivo de la caida de consumo..." onchange="as(\''+r.id+'\')">'+(n.motivo||'')+'</textarea></div>'
    +'<div><div class="fl"><span class="dot g"></span>Posibilidades de recuperacion</div>'
    +'<textarea id="co-'+r.id+'" placeholder="Condiciones para recuperar..." onchange="as(\''+r.id+'\')">'+(n.condiciones||'')+'</textarea></div>'
    +'</div>'
    +'<div class="ff"><button class="sb" id="sb-'+r.id+'" onclick="sc(\''+r.id+'\')">Guardar</button></div>'
    +'</div>'
    +'</div>';
}

function tog(id){
  var f=document.getElementById('f-'+id),c=document.getElementById('c-'+id);
  var o=f.classList.contains('open');
  f.classList.toggle('open',!o);c.classList.toggle('expanded',!o);
}

function as(id){
  var m=(document.getElementById('m-'+id)||{}).value||'';
  var co=(document.getElementById('co-'+id)||{}).value||'';
  N[id]={motivo:m,condiciones:co,ts:new Date().toISOString()};
  var c=document.getElementById('c-'+id);
  if(c)c.classList.toggle('done',!!(m||co));
}

async function sc(id){
  as(id);
  var b=document.getElementById('sb-'+id);
  b.textContent='Guardando...';b.disabled=true;
  await enviar(id);
  b.classList.add('flash');b.textContent='Guardado';b.disabled=false;
  setTimeout(function(){b.classList.remove('flash');b.textContent='Guardar';},2000);
  render();
}

async function guardarTodo(){
  var btn=document.getElementById('gbtn');
  btn.textContent='Guardando...';btn.disabled=true;
  var todos=DATA.bajaron.concat(DATA.no_consumen);
  var con=todos.filter(function(r){return N[r.id]&&(N[r.id].motivo||N[r.id].condiciones);});
  for(var i=0;i<con.length;i++)await enviar(con[i].id);
  btn.textContent='Guardado';btn.disabled=false;
  setTimeout(function(){btn.textContent='Guardar todo';},2500);
  toast(con.length+' respuestas guardadas en Google Sheets');
}

function render(){
  var vc={};
  DATA.bajaron.concat(DATA.no_consumen).forEach(function(r){if(!vc[r.vendedor])vc[r.vendedor]={b:0,n:0};});
  DATA.bajaron.forEach(function(r){vc[r.vendedor].b++;});
  DATA.no_consumen.forEach(function(r){vc[r.vendedor].n++;});
  var vt=document.getElementById('vtabs');
  vt.innerHTML='';
  Object.keys(vc).sort().forEach(function(v){
    var t=vc[v].b+vc[v].n,btn=document.createElement('button');
    btn.className='tab'+(v===VA?' on':'');
    btn.innerHTML=v+' <span class="bdg">'+t+'</span>';
    btn.onclick=function(){VA=v;render();};
    vt.appendChild(btn);
  });
  var sb=document.getElementById('stBlk'),mc=document.getElementById('mc');
  if(!VA){
    sb.innerHTML='';
    mc.innerHTML='<div class="empty">Selecciona un vendedor para ver sus clientes</div>';
    return;
  }
  var baj=DATA.bajaron.filter(function(r){return r.vendedor===VA;});
  var noc=DATA.no_consumen.filter(function(r){return r.vendedor===VA;});
  var tot=baj.length+noc.length;
  var comp=baj.concat(noc).filter(function(r){var n=N[r.id];return n&&(n.motivo||n.condiciones);}).length;
  sb.innerHTML='<div class="stat"><div class="sl">Total clientes</div><div class="sv b">'+tot+'</div></div>'
    +'<div class="stat"><div class="sl">Bajaron consumo</div><div class="sv r">'+baj.length+'</div></div>'
    +'<div class="stat"><div class="sl">Ya no consumen</div><div class="sv o">'+noc.length+'</div></div>'
    +'<div class="stat"><div class="sl">Completados</div><div class="sv g">'+comp+'/'+tot+'</div></div>';
  var h='';
  if(baj.length){
    h+=prog(baj);
    h+='<div class="sect"><span class="pill r">Bajaron consumo</span><span style="font-size:0.85rem;color:var(--mt)">'+baj.length+' clientes</span></div>';
    h+='<div class="cards">'+baj.map(function(r){return card(r,'b');}).join('')+'</div>';
  }
  if(noc.length){
    h+=prog(noc);
    h+='<div class="sect" style="margin-top:2rem"><span class="pill o">Ya no consumen</span><span style="font-size:0.85rem;color:var(--mt)">'+noc.length+' clientes</span></div>';
    h+='<div class="cards">'+noc.map(function(r){return card(r,'n');}).join('')+'</div>';
  }
  mc.innerHTML=h;
}

function verResumen(){
  document.getElementById('mRes').style.display='block';
  var todos=DATA.bajaron.concat(DATA.no_consumen);
  var con=todos.filter(function(r){var n=N[r.id];return n&&(n.motivo||n.condiciones);});
  document.getElementById('rStats').innerHTML='<strong style="color:var(--gr)">'+con.length+'</strong> de '+todos.length+' completados - <span style="color:var(--ac)">'+(todos.length-con.length)+' pendientes</span>';
  var vend=[];todos.forEach(function(r){if(vend.indexOf(r.vendedor)<0)vend.push(r.vendedor);});vend.sort();
  var rows='';
  vend.forEach(function(v){
    var cl=todos.filter(function(r){return r.vendedor===v;});
    cl.forEach(function(r,i){
      var n=N[r.id]||{};
      var tipo=DATA.no_consumen.find(function(x){return x.id===r.id;});
      var p=!tipo?fmtP(r.variacionPct):'-';
      rows+='<tr>'+(i===0?'<td rowspan="'+cl.length+'" style="padding:0.5rem;font-weight:700;color:var(--ac3);vertical-align:middle;border-right:1px solid var(--bdr)">'+v+'</td>':'')
        +'<td style="padding:0.5rem"><small style="color:var(--mt)">'+r.id+'</small><br><strong>'+r.empresa+'</strong></td>'
        +'<td style="padding:0.5rem">'+(!tipo?'Bajo consumo':'No consume')+'</td>'
        +'<td style="padding:0.5rem;text-align:right;color:var(--ac2)">'+fmt(r.mejorHistorico)+'</td>'
        +'<td style="padding:0.5rem;text-align:right">'+p+'</td>'
        +'<td style="padding:0.5rem;max-width:200px;word-break:break-word;'+(n.motivo?'':'color:#3a4260;font-style:italic')+'">'+  (n.motivo||'Sin completar')+'</td>'
        +'<td style="padding:0.5rem;max-width:200px;word-break:break-word;'+(n.condiciones?'':'color:#3a4260;font-style:italic')+'">'+  (n.condiciones||'Sin completar')+'</td>'
        +'</tr>';
    });
  });
  document.getElementById('rTabla').innerHTML='<table style="width:100%;border-collapse:collapse;font-size:0.82rem"><thead><tr style="background:var(--sur2)"><th style="padding:0.5rem;text-align:left;color:var(--mt);font-size:0.68rem;text-transform:uppercase">Vendedor</th><th style="padding:0.5rem;text-align:left;color:var(--mt);font-size:0.68rem;text-transform:uppercase">Empresa</th><th style="padding:0.5rem;color:var(--mt);font-size:0.68rem;text-transform:uppercase">Tipo</th><th style="padding:0.5rem;text-align:right;color:var(--mt);font-size:0.68rem;text-transform:uppercase">Mejor Hist.</th><th style="padding:0.5rem;text-align:right;color:var(--mt);font-size:0.68rem;text-transform:uppercase">Var%</th><th style="padding:0.5rem;color:var(--mt);font-size:0.68rem;text-transform:uppercase">Motivo</th><th style="padding:0.5rem;color:var(--mt);font-size:0.68rem;text-transform:uppercase">Recuperacion</th></tr></thead><tbody>'+rows+'</tbody></table>';
}

function cerrar(){document.getElementById('mRes').style.display='none';}

function exportarExcel(){
  if(typeof XLSX==='undefined'){alert('Espere e intente de nuevo');return;}
  var todos=DATA.bajaron.concat(DATA.no_consumen),wb=XLSX.utils.book_new();
  var wd=[['Vendedor','ID','Empresa','Tipo','Consumo 2024','Consumo 2025','Mejor Historico','Anno Mejor','Vol 2026','Variacion %','Motivo','Condiciones','Ultima actualizacion']];
  todos.forEach(function(r){
    var n=N[r.id]||{};
    var tipo=DATA.no_consumen.find(function(x){return x.id===r.id;})?'Ya no consume':'Bajo consumo';
    var p=tipo==='Bajo consumo'?parseFloat((r.variacionPct*100).toFixed(1)):null;
    wd.push([r.vendedor,r.id,r.empresa,tipo,r.consumo2024||null,r.consumo2025||null,r.mejorHistorico,r.annoMejor,r.vol2026||null,p,n.motivo||'',n.condiciones||'',n.ts?new Date(n.ts).toLocaleString('es-AR'):'']);
  });
  var ws=XLSX.utils.aoa_to_sheet(wd);
  ws['!cols']=[{wch:22},{wch:11},{wch:36},{wch:14},{wch:14},{wch:14},{wch:16},{wch:10},{wch:14},{wch:12},{wch:45},{wch:45},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws,'Todas las respuestas');
  var vend=[];todos.forEach(function(r){if(vend.indexOf(r.vendedor)<0)vend.push(r.vendedor);});
  vend.sort().forEach(function(v){
    var cl=todos.filter(function(r){return r.vendedor===v;});
    var sd=[['ID','Empresa','Tipo','Mejor Historico','Vol 2026','Variacion %','Motivo','Condiciones']];
    cl.forEach(function(r){
      var n=N[r.id]||{};
      var tipo=DATA.no_consumen.find(function(x){return x.id===r.id;})?'Ya no consume':'Bajo consumo';
      sd.push([r.id,r.empresa,tipo,r.mejorHistorico,r.vol2026||null,tipo==='Bajo consumo'?parseFloat((r.variacionPct*100).toFixed(1)):null,n.motivo||'',n.condiciones||'']);
    });
    var wsv=XLSX.utils.aoa_to_sheet(sd);
    wsv['!cols']=[{wch:11},{wch:36},{wch:14},{wch:16},{wch:14},{wch:12},{wch:45},{wch:45}];
    XLSX.utils.book_append_sheet(wb,wsv,v.substring(0,28));
  });
  XLSX.writeFile(wb,'respuestas_consumo2026.xlsx');
  toast('Excel exportado correctamente');
}

render();
cargar().then(function(){render();});

</script>
</body></html>
